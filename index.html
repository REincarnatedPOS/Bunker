<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUNKER_OS v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .stat-box { background-color: #111827; border: 1px solid #374151; cursor: pointer; transition: 0.2s; padding: 4px 8px; border-radius: 4px; margin: 2px 0; font-size: 0.75rem; }
        .stat-hidden { color: transparent !important; background-color: #1f2937; border-color: #111827; }
        .stat-hidden:hover { background-color: #374151; }
        .revealed { color: #10b981; border-color: #064e3b; }
        .kicked { opacity: 0.2; filter: grayscale(1); pointer-events: none; }
        th { text-transform: uppercase; font-size: 0.65rem; color: #6b7280; padding: 8px; }
        tr { border-bottom: 1px solid #1f2937; }
        .uber-style { color: #f59e0b !important; font-weight: bold; }
    </style>
</head>
<body class="bg-black text-gray-300 min-h-screen p-4 font-mono">

    <div id="setup-screen" class="max-w-2xl mx-auto mt-20 bg-gray-900 p-8 border border-green-900/30">
        <h1 class="text-2xl font-bold mb-6 text-green-500 italic">SYSTEM_INIT: INPUT_SUBJECT_NAMES</h1>
        <textarea id="player-names" class="w-full bg-black border border-gray-800 p-4 rounded mb-6 h-40 focus:border-green-500 outline-none text-green-400" placeholder="Тимур, Камиль, Рома..."></textarea>
        <button onclick="startGame()" class="w-full bg-green-900 hover:bg-green-700 text-white font-bold py-4 transition">ЗАПУСК СИМУЛЯЦИИ</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="flex justify-between items-center mb-4 border-b border-green-900/50 pb-2">
            <h1 class="text-xl font-bold text-green-500">DATABASE: SHELTER_CANDIDATES</h1>
            <button onclick="resetGame()" class="text-[10px] text-red-800 border border-red-900 px-2 py-1">HARD_RESET</button>
        </div>
        
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr>
                        <th>Субъект</th>
                        <th>Био (В/П/Р)</th>
                        <th>Личность (О/Ч)</th>
                        <th>Профессия</th>
                        <th>Здоровье</th>
                        <th>Хобби</th>
                        <th>Черта</th>
                        <th>Багаж (М/Б)</th>
                        <th>Спец. Возможности</th>
                        <th>Статус</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const DATA = {
            profs: ["Программист C++", "Мясник", "Философ", "Агроном", "Священник", "Кардиохирург", "Электрик", "Полицейский", "Блогер"],
            health: ["Идеальное", "Диабет 2 типа", "Шизофрения", "Аллергия на всё", "Слепота на один глаз", "Лунатизм", "Кашель"],
            hobbies: ["Шахматы", "Бокс", "Стихи", "Minecraft", "Рыбалка", "Дзюдо", "Рисование", "Паркур"],
            traits: ["Паникер", "Лидер", "Перфекционист", "Черный юмор", "Трус", "Альтруист", "Мизантроп"],
            small_items: ["Ваза", "Нож", "Фонарик", "Зажигалка", "Книга", "Фото семьи", "Серебряная ложка"],
            large_items: ["Матрас", "Генератор", "Мешок картошки", "Палатка", "Бочка воды", "Сварочный аппарат"],
            specials: ["Смена профессии", "Иммунитет на ходу", "Право вето", "Узнать черту другого", "Воскрешение", "Удвоить еду"],
            orientations: ["Гетеро", "Гомо", "Би", "Пансексуал", "Асексуал", "Сапиосексуал", "Объектофил"],
            races: ["Оборотень", "Вампир", "Кошко-человек"]
        };

        let players = JSON.parse(localStorage.getItem('bunker_v3')) || [];

        function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function generateCharacter(name) {
            const isUber = Math.random() < 0.001;
            const isHuman = Math.random() > 0.05;

            if (isUber) {
                return {
                    name, isAlive: true,
                    stats: [
                        { label: "Био", items: [getRandomInt(1000, 3000), "Уберменш", "Существо"], revealed: [false, false, false] },
                        { label: "Личность", items: ["Восходящая", "—"], revealed: [false, true] },
                        { label: "Проф", items: ["Создатель миров"], revealed: [false] },
                        { label: "Здоровье", items: ["Бессмертие"], revealed: [false] },
                        { label: "Хобби", items: ["Наблюдение"], revealed: [false] },
                        { label: "Черта", items: ["Вне морали"], revealed: [false] },
                        { label: "Багаж", items: ["Сингулярность (М)", "Мультивселенная (Б)"], revealed: [false, false] },
                        { label: "Спец", items: ["Стирание игрока", "Перезапуск времени"], revealed: [false, false] }
                    ]
                };
            }

            return {
                name, isAlive: true,
                stats: [
                    { label: "Био", items: [getRandomInt(5, 120), rnd(["Мужской", "Женский"]), isHuman ? "Человек" : rnd(DATA.races)], revealed: [false, false, false] },
                    { label: "Личность", items: [rnd(DATA.orientations), Math.random() > 0.5 ? "Childfree" : "Хочет детей"], revealed: [false, false] },
                    { label: "Проф", items: [rnd(DATA.profs)], revealed: [false] },
                    { label: "Здоровье", items: [rnd(DATA.health)], revealed: [false] },
                    { label: "Хобби", items: [rnd(DATA.hobbies)], revealed: [false] },
                    { label: "Черта", items: [rnd(DATA.traits)], revealed: [false] },
                    { label: "Багаж", items: [rnd(DATA.small_items) + " (М)", rnd(DATA.large_items) + " (Б)"], revealed: [false, false] },
                    { label: "Спец", items: [rnd(DATA.specials), rnd(DATA.specials)], revealed: [false, false] }
                ]
            };
        }

        function startGame() {
            const input = document.getElementById('player-names').value;
            if (!input) return;
            players = input.split(',').map(n => n.trim()).filter(n => n).map(n => generateCharacter(n));
            saveAndRender();
        }

        function toggleSubStat(pIdx, sIdx, iIdx) {
            players[pIdx].stats[sIdx].revealed[iIdx] = !players[pIdx].stats[sIdx].revealed[iIdx];
            saveAndRender();
        }

        function editSubStat(e, pIdx, sIdx, iIdx) {
            e.preventDefault();
            const val = prompt("Изменить значение:", players[pIdx].stats[sIdx].items[iIdx]);
            if (val !== null) { players[pIdx].stats[sIdx].items[iIdx] = val; saveAndRender(); }
        }

        function saveAndRender() {
            localStorage.setItem('bunker_v3', JSON.stringify(players));
            render();
        }

        function render() {
            if (players.length === 0) {
                document.getElementById('setup-screen').classList.remove('hidden');
                document.getElementById('game-screen').classList.add('hidden');
                return;
            }
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            players.forEach((p, pIdx) => {
                const tr = document.createElement('tr');
                if (!p.isAlive) tr.className = 'kicked';
                
                let html = `<td class="p-2 font-bold text-white text-sm">${p.name}</td>`;
                
                p.stats.forEach((s, sIdx) => {
                    let subHtml = s.items.map((item, iIdx) => `
                        <div onclick="toggleSubStat(${pIdx}, ${sIdx}, ${iIdx})" 
                             oncontextmenu="editSubStat(event, ${pIdx}, ${sIdx}, ${iIdx})"
                             class="stat-box ${s.revealed[iIdx] ? 'revealed' : 'stat-hidden'}">
                             ${item}
                        </div>
                    `).join('');
                    html += `<td class="p-1">${subHtml}</td>`;
                });

                html += `<td class="p-2">
                    <button onclick="players[${pIdx}].isAlive = !players[${pIdx}].isAlive; saveAndRender();" 
                            class="text-[9px] border border-gray-700 px-2 py-1 hover:bg-red-900 transition">
                        ${p.isAlive ? 'ВЫГНАТЬ' : 'ВЕРНУТЬ'}
                    </button>
                </td>`;
                
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });
        }

        function resetGame() { if(confirm("Удалить все данные?")) { players = []; saveAndRender(); } }
        render();
    </script>
</body>
</html>
